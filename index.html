<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Near-Earth Object (NEO) Dashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #111116;
            color: #f0f0f5;
            margin: 0;
            padding: 20px;
        }
        header {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            text-align: center;
        }
        h1 {
            margin-bottom: 5px;
            font-weight: 700;
        }
        p {
            color: #8a8a9d;
            margin-top: 0;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        .chart-card {
            background-color: #1a1a24;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #2d2d3d;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        iframe {
            width: 100%;
            height: 450px;
            border: none;
            border-radius: 4px;
            background-color: #111116;
        }
    </style>
</head>
<body>

    <header>
        <h1>Near-Earth Object (NEO) Asteroid Explorer</h1>
        <p>Check out some cool visuals from NASA's NEO csv!</p>
    </header>

    <main class="dashboard-grid">
        <div class="chart-card">
            <iframe src="chart1.html"></iframe>
        </div>
        <div class="chart-card">
            <iframe src="chart2.html"></iframe>
        </div>
        <div class="chart-card">
            <iframe src="chart3.html"></iframe>
        </div>
        <div class="chart-card">
            <iframe src="chart4.html"></iframe>
        </div>
    </main>

</body>
</html>
